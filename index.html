<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: Martian Mono;
        }
    </style>
</head>

<body>
      <section class="grid grid-cols-2 py-4 px-20 items-center justify-items-center max-w-7xl mx-auto gap-8">
               <div class="banner-left">
                    <h2 class="text-[50px] font-bold">It's good<br>tea time at The<br>Tea House</h2>
                    <p class="text-[#777777] my-[14px]">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
                    <button class="bg-linear-to-r from-cyan-500 to-blue-500 py-2 px-4 rounded-md text-white bg-red-600">Explore More <i class="-rotate-45 fa-solid fa-arrow-right"></i></button>
               </div>
          
               <div class="banner-right flex justify-end items-end relative">
                    <img src="images/banner.png">
                    <div class="absolute bottom-[15px] left-[90px] bg-white rounded-xl shadow-2xl flex justify-center gap-3 items-center w-[250px] h-[80px] py-[25px] px-[15px]">
                         <img src="images/rating.png" class="w-12 filter brightness-0">
                         <div class="flex flex-col items-center">
                            <h2 class="font-bold text-xl leading-tight">5.00</h2>
                            <p class="text-sm text-gray-500">Trust Rating</p>
                         </div>
                    </div>
                </div>
      </section>

</body>
</html>
