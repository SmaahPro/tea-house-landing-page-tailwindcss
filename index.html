<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: Martian Mono;
        }
    </style>
</head>

<body>
    <section class="grid grid-cols-1 md:grid-cols-2 py-8 px-6 md:px-20 items-center justify-items-center max-w-7xl mx-auto gap-12">
     
        <div class="banner-left text-center md:text-left">
            <h2 class="text-4xl text-[34px] md:text-[50px] font-bold leading-tight">It's good<br>tea time at The<br>Tea House</h2>
            <p class="text-[#777777] my-[14px] text-sm md:text-base">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
            <button class="bg-linear-to-r from-cyan-500 to-blue-500 py-2 px-4 rounded-md text-white">Explore More <i class="-rotate-45 fa-solid fa-arrow-right"></i></button>
        </div>

        <div class="banner-right relative flex justify-center">
            <img src="images/banner.png" class="w-full max-w-[400px] md:max-w-full">
          
            <div class="absolute -bottom-5 left-0 right-0 mx-auto md:mx-0 md:bottom-[15px] md:left-[90px] bg-white rounded-xl shadow-2xl flex justify-center gap-3 items-center w-[220px] md:w-[250px] h-[80px] py-[25px] px-[15px]">
                <img src="images/rating.png" class="w-12 filter brightness-0">
                <div class="flex flex-col items-center">
                    <h2 class="font-bold text-xl leading-tight">5.00</h2>
                    <p class="text-sm text-gray-500">Trust Rating</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
